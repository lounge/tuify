name: CI

on:
  push:
    branches: [develop, 'feature/**']
  pull_request:
    branches: [develop, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Linux audio deps
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Check gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::The following files are not gofmt-formatted:"
            echo "$unformatted"
            echo "Run 'gofmt -w .' to fix."
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          # Build from source with the runner's Go toolchain so the
          # linter's internal typechecker matches go.mod (1.26.1). The
          # prebuilt binary release is compiled with Go 1.24 and chokes
          # on 1.25/1.26-targeted stdlib + deps.
          install-mode: goinstall

  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install Linux audio deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...
